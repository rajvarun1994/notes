let lockTimer = null;
const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

async function unlock(){
  const pw = document.getElementById('pw').value;
  const err = document.getElementById('err');
  err.textContent = '';
  if(!pw){ return; }
  try{
    const salt=b64(DATA.salt), iv=b64(DATA.iv), ct=b64(DATA.ct);
    const base = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      {name:'PBKDF2', salt, iterations:DATA.iter, hash:'SHA-256'},
      base, {name:'AES-GCM', length:256}, false, ['decrypt']);
    const buf = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ct);
    render(new TextDecoder().decode(buf));
  }catch(e){
    err.textContent = 'Wrong passphrase.';
  }
}

function render(md){
  document.getElementById('view').innerHTML = mdToHtml(md);
  document.getElementById('gate').style.display = 'none';
  document.getElementById('view').style.display = 'block';
  document.getElementById('bar').style.display = 'flex';
  document.getElementById('pw').value = '';
  window.scrollTo(0,0);
  arm();
}
function lockNow(){
  const v = document.getElementById('view');
  v.innerHTML = ''; v.style.display = 'none';
  document.getElementById('bar').style.display = 'none';
  document.getElementById('gate').style.display = 'flex';
  if(lockTimer) clearTimeout(lockTimer);
}
function arm(){ if(lockTimer) clearTimeout(lockTimer); lockTimer = setTimeout(lockNow, 180000); }
['click','keydown','touchstart','scroll'].forEach(ev =>
  document.addEventListener(ev, () => { if(document.getElementById('view').style.display==='block') arm(); }, {passive:true}));
document.addEventListener('visibilitychange', () => { if(document.hidden) lockNow(); });
document.getElementById('pw').addEventListener('keydown', e => { if(e.key==='Enter') unlock(); });

function esc(s){ return s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function inline(s){ return esc(s)
  .replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')
  .replace(/\*(.+?)\*/g,'<i>$1</i>')
  .replace(/`(.+?)`/g,'<code>$1</code>'); }
function mdToHtml(md){
  const lines = md.split(/\r?\n/); let out = []; let list = null;
  const close = () => { if(list){ out.push(list==='ol'?'</ol>':'</ul>'); list=null; } };
  const ul = () => { if(list!=='ul'){ close(); out.push('<ul>'); list='ul'; } };
  const ol = () => { if(list!=='ol'){ close(); out.push('<ol>'); list='ol'; } };
  for(const ln of lines){
    if(/^### /.test(ln)){ close(); out.push('<h3>'+inline(ln.slice(4))+'</h3>'); }
    else if(/^## /.test(ln)){ close(); out.push('<h2>'+inline(ln.slice(3))+'</h2>'); }
    else if(/^# /.test(ln)){ close(); out.push('<h1>'+inline(ln.slice(2))+'</h1>'); }
    else if(/^>\s?/.test(ln)){ close(); out.push('<blockquote>'+inline(ln.replace(/^>\s?/,''))+'</blockquote>'); }
    else if(/^---+\s*$/.test(ln)){ close(); out.push('<hr>'); }
    else if(/^\s*[-*]\s+/.test(ln)){ ul(); out.push('<li>'+inline(ln.replace(/^\s*[-*]\s+/,''))+'</li>'); }
    else if(/^\s*\d+\.\s+/.test(ln)){ ol(); out.push('<li>'+inline(ln.replace(/^\s*\d+\.\s+/,''))+'</li>'); }
    else if(ln.trim()===''){ close(); }
    else { close(); out.push('<p>'+inline(ln)+'</p>'); }
  }
  close();
  return out.join('\n');
}
</script>
